# ------------------------------
# Ativar TLP
TLP_ENABLE=1

# CPU Scaling Governor
CPU_SCALING_GOVERNOR_ON_AC=performance
CPU_SCALING_GOVERNOR_ON_BAT=powersave
CPU_SCALING_GOVERNOR_ON_SAV=powersave

# Min/Max Frequencies - 0 = automático, bom pra Ryzen mobile
CPU_SCALING_MIN_FREQ_ON_AC=0
CPU_SCALING_MAX_FREQ_ON_AC=0
CPU_SCALING_MIN_FREQ_ON_BAT=0
CPU_SCALING_MAX_FREQ_ON_BAT=0
CPU_SCALING_MIN_FREQ_ON_SAV=0
CPU_SCALING_MAX_FREQ_ON_SAV=0

# CPU Boost - AMD Core Performance Boost
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=1
CPU_BOOST_ON_SAV=0

# PCIe ASPM (economia de energia sem perder performance)
PCIE_ASPM_ON_AC=powersave
PCIE_ASPM_ON_BAT=powersave

# Runtime PM para PCIe
RUNTIME_PM_ON_AC=on
RUNTIME_PM_ON_BAT=auto

# USB autosuspend
USB_AUTOSUSPEND=1
USB_EXCLUDE_BTUSB=1   # não suspender Bluetooth
USB_EXCLUDE_XHCI_HUB=0 # permitir suspender hubs genéricos

# Disco / NVMe
DISK_IDLE_SECS_ON_AC=0
DISK_IDLE_SECS_ON_BAT=2
NVME_POWER_SAVE_ON_AC=0
NVME_POWER_SAVE_ON_BAT=1

# Battery thresholds
START_CHARGE_THRESH_BAT0=75
STOP_CHARGE_THRESH_BAT0=80
RESTORE_THRESHOLDS_ON_BAT=1
